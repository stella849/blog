<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>새 비밀번호 설정 — 블로그</title>
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<header class="nav-bar">
  <div class="container">
    <a href="index.html" class="brand">BuilderLog</a>
    <nav class="nav-links"><a href="index.html">홈</a></nav>
  </div>
</header>

<main class="container mt-lg" style="max-width: 420px;">
  <h1>새 비밀번호 설정</h1>
  <div id="loading" class="muted">이메일 링크 확인 중...</div>
  <form id="reset-form" class="card stack" style="display:none;">
    <div class="form-group">
      <label for="password">새 비밀번호</label>
      <input type="password" id="password" required minlength="6" />
    </div>
    <div class="form-group">
      <label for="password2">새 비밀번호 확인</label>
      <input type="password" id="password2" required minlength="6" />
    </div>
    <div id="error" class="form-error" style="display:none;"></div>
    <button type="submit" class="btn btn-primary">비밀번호 변경</button>
  </form>
  <div id="invalid-link" class="form-error" style="display:none;">
    링크가 만료되었거나 유효하지 않습니다. <a href="forgot-password.html">재설정 메일을 다시 요청</a>해주세요.
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/supabaseClient.js"></script>
<script>
// 이메일 링크를 타고 들어오면 Supabase가 URL의 토큰을 읽어 임시 세션을 만들어준다(PASSWORD_RECOVERY 이벤트).
supabaseClient.auth.onAuthStateChange((event, session) => {
  document.getElementById("loading").style.display = "none";
  if (event === "PASSWORD_RECOVERY" || session) {
    document.getElementById("reset-form").style.display = "block";
  } else {
    document.getElementById("invalid-link").style.display = "block";
  }
});

// onAuthStateChange가 안 불릴 수도 있으니, 세션이 이미 있는지도 직접 한번 확인
(async () => {
  const { data: { session } } = await supabaseClient.auth.getSession();
  document.getElementById("loading").style.display = "none";
  if (session) {
    document.getElementById("reset-form").style.display = "block";
  }
})();

document.getElementById("reset-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const errorEl = document.getElementById("error");
  errorEl.style.display = "none";

  const password = document.getElementById("password").value;
  const password2 = document.getElementById("password2").value;

  if (password !== password2) {
    errorEl.textContent = "비밀번호가 서로 일치하지 않습니다.";
    errorEl.style.display = "block";
    return;
  }

  const { error } = await supabaseClient.auth.updateUser({ password });

  if (error) {
    errorEl.textContent = error.message;
    errorEl.style.display = "block";
    return;
  }

  alert("비밀번호가 변경되었습니다. 다시 로그인해주세요.");
  await supabaseClient.auth.signOut();
  window.location.href = "login.html";
});
</script>
</body>
</html>
