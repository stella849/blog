<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>비밀번호 재설정 요청 — 블로그</title>
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<header class="nav-bar">
  <div class="container">
    <a href="index.html" class="brand">My Blog</a>
    <nav class="nav-links"><a href="index.html">홈</a></nav>
  </div>
</header>

<main class="container mt-lg" style="max-width: 420px;">
  <h1>비밀번호 재설정</h1>
  <p class="muted">가입한 이메일을 입력하면 재설정 링크를 보내드려요.</p>
  <form id="forgot-form" class="card stack">
    <div class="form-group">
      <label for="email">이메일</label>
      <input type="email" id="email" required />
    </div>
    <div id="error" class="form-error" style="display:none;"></div>
    <div id="success" class="muted" style="display:none;">메일을 보냈습니다. 받은편지함(스팸함도 확인)에서 링크를 클릭해주세요.</div>
    <button type="submit" class="btn btn-primary">재설정 메일 보내기</button>
  </form>
  <p class="muted mt-lg"><a href="login.html">로그인으로 돌아가기</a></p>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/supabaseClient.js"></script>
<script>
document.getElementById("forgot-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const errorEl = document.getElementById("error");
  const successEl = document.getElementById("success");
  errorEl.style.display = "none";
  successEl.style.display = "none";

  const email = document.getElementById("email").value.trim();

  const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + "/reset-password.html",
  });

  if (error) {
    errorEl.textContent = error.message;
    errorEl.style.display = "block";
    return;
  }

  successEl.style.display = "block";
});
</script>
</body>
</html>
