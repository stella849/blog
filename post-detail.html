<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>게시글 — 블로그</title>
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<header class="nav-bar">
  <div class="container">
    <a href="index.html" class="brand">BuilderLog</a>
    <nav class="nav-links">
      <a href="index.html">홈</a>
      <a href="post-new.html" class="auth-only" style="display:none">글쓰기</a>
      <a href="mypage.html" class="auth-only" style="display:none">마이페이지</a>
      <a href="admin.html" class="admin-only" style="display:none">관리자</a>
      <a href="login.html" class="guest-only btn-utility" style="display:none">로그인</a>
      <a href="signup.html" class="guest-only" style="display:none">회원가입</a>
      <button id="logout-btn" class="btn-utility auth-only" style="display:none">로그아웃</button>
    </nav>
  </div>
</header>

<main class="container mt-lg" style="max-width: 720px;">
  <div id="post" class="card"><p class="muted">불러오는 중...</p></div>

  <div class="card mt-lg">
    <h3>댓글 <span id="comment-count" class="muted"></span></h3>
    <div id="comment-list" class="stack mt-lg"><p class="muted">불러오는 중...</p></div>
    <div id="comment-form-wrap" class="mt-lg"></div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/nav.js"></script>
<script src="js/util.js"></script>
<script>
const id = new URLSearchParams(window.location.search).get("id");

async function loadPost() {
  const el = document.getElementById("post");
  if (!id) {
    el.innerHTML = `<p class="form-error">잘못된 요청입니다.</p>`;
    return;
  }

  const { data: post, error } = await supabaseClient
    .from("posts")
    .select("id, title, content, thumbnail_image, attachment_url, attachment_name, view_count, created_at, user_id, profiles(nickname), categories(name)")
    .eq("id", id)
    .single();

  if (error || !post) {
    el.innerHTML = `<p class="form-error">게시글을 찾을 수 없습니다.</p>`;
    return;
  }

  // 조회수 +1 (실패해도 화면 표시에는 영향 없음)
  supabaseClient.from("posts").update({ view_count: post.view_count + 1 }).eq("id", id).then(() => {});

  const { data: tagRows } = await supabaseClient.from("post_tags").select("tags(name)").eq("post_id", id);
  const tagNames = (tagRows || []).map((t) => t.tags?.name).filter(Boolean);

  const { data: { session } } = await supabaseClient.auth.getSession();
  const admin = await isAdmin(session);
  const canManage = session && (session.user.id === post.user_id || admin);

  el.innerHTML = `
    ${post.thumbnail_image ? `<img src="${escapeHtml(post.thumbnail_image)}" alt="" style="width:100%;border-radius:var(--radius-lg);margin-bottom:var(--space-md);" />` : ""}
    <h1>${escapeHtml(post.title)}</h1>
    <div class="meta muted">
      ${escapeHtml(post.profiles?.nickname ?? "알 수 없음")} · ${new Date(post.created_at).toLocaleString("ko-KR")}
      ${post.categories?.name ? " · " + escapeHtml(post.categories.name) : ""} · 조회 ${post.view_count + 1}
    </div>
    <div class="badge-list">${tagNames.map((t) => `<span class="badge-pill">#${escapeHtml(t)}</span>`).join("")}</div>
    <hr class="hairline-divider" />
    <div id="content-body" style="white-space: pre-wrap;">${escapeHtml(post.content)}</div>
    ${post.attachment_url ? `
      <hr class="hairline-divider" />
      <a href="${escapeHtml(post.attachment_url)}" target="_blank" rel="noopener" class="btn-utility">📎 ${escapeHtml(post.attachment_name || "첨부파일")} 다운로드</a>
    ` : ""}
    ${canManage ? `
      <hr class="hairline-divider" />
      <div class="row">
        <a href="post-edit.html?id=${post.id}" class="btn btn-secondary">수정</a>
        <button id="delete-btn" class="btn btn-danger">삭제</button>
      </div>
    ` : ""}
  `;

  if (canManage) {
    document.getElementById("delete-btn").addEventListener("click", async () => {
      if (!confirm("정말 삭제하시겠습니까?")) return;
      const { error: deleteError } = await supabaseClient.from("posts").delete().eq("id", id);
      if (deleteError) {
        alert("삭제에 실패했습니다: " + deleteError.message);
        return;
      }
      window.location.href = "index.html";
    });
  }
}

async function loadComments() {
  const listEl = document.getElementById("comment-list");

  const { data: comments, error } = await supabaseClient
    .from("comments")
    .select("id, content, created_at, user_id, profiles(nickname)")
    .eq("post_id", id)
    .order("created_at", { ascending: true });

  if (error) {
    listEl.innerHTML = `<p class="form-error">댓글을 불러오지 못했습니다: ${escapeHtml(error.message)}</p>`;
    return;
  }

  document.getElementById("comment-count").textContent = comments.length ? `(${comments.length})` : "";

  if (!comments.length) {
    listEl.innerHTML = `<p class="muted">아직 댓글이 없습니다.</p>`;
    return;
  }

  const { data: { session } } = await supabaseClient.auth.getSession();
  const admin = await isAdmin(session);

  listEl.innerHTML = comments
    .map((c) => {
      const canDelete = session && (session.user.id === c.user_id || admin);
      return `
        <div class="comment-item">
          <div class="comment-meta muted">${escapeHtml(c.profiles?.nickname ?? "알 수 없음")} · ${new Date(c.created_at).toLocaleString("ko-KR")}</div>
          <div class="comment-content">${escapeHtml(c.content)}</div>
          ${canDelete ? `<button class="btn-utility comment-delete-btn" data-comment-id="${c.id}">삭제</button>` : ""}
        </div>
      `;
    })
    .join("");

  listEl.querySelectorAll(".comment-delete-btn").forEach((btn) => {
    btn.addEventListener("click", async () => {
      if (!confirm("댓글을 삭제하시겠습니까?")) return;
      const { error: deleteError } = await supabaseClient.from("comments").delete().eq("id", btn.dataset.commentId);
      if (deleteError) {
        alert("삭제에 실패했습니다: " + deleteError.message);
        return;
      }
      loadComments();
    });
  });
}

async function initCommentForm() {
  const wrap = document.getElementById("comment-form-wrap");
  const { data: { session } } = await supabaseClient.auth.getSession();

  if (!session) {
    wrap.innerHTML = `<p class="muted">댓글을 작성하려면 <a href="login.html">로그인</a>하세요.</p>`;
    return;
  }

  const emojis = ["😀", "😂", "😍", "👍", "👏", "🎉", "😢", "🙏", "🔥", "💪"];

  wrap.innerHTML = `
    <form id="comment-form" class="stack">
      <div class="comment-emoji-picker">
        ${emojis.map((e) => `<button type="button" class="emoji-btn">${e}</button>`).join("")}
      </div>
      <textarea id="comment-content" class="comment-textarea" placeholder="댓글을 남겨보세요" required></textarea>
      <div id="comment-error" class="form-error" style="display:none;"></div>
      <button type="submit" class="btn btn-primary" style="align-self:flex-start;">댓글 등록</button>
    </form>
  `;

  const commentTextarea = document.getElementById("comment-content");
  wrap.querySelectorAll(".emoji-btn").forEach((btn) => {
    btn.addEventListener("click", () => {
      const start = commentTextarea.selectionStart;
      const end = commentTextarea.selectionEnd;
      const emoji = btn.textContent;
      commentTextarea.value = commentTextarea.value.slice(0, start) + emoji + commentTextarea.value.slice(end);
      const cursor = start + emoji.length;
      commentTextarea.focus();
      commentTextarea.setSelectionRange(cursor, cursor);
    });
  });

  document.getElementById("comment-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const errorEl = document.getElementById("comment-error");
    errorEl.style.display = "none";

    const contentEl = document.getElementById("comment-content");
    const content = contentEl.value.trim();
    if (!content) return;

    const { error } = await supabaseClient.from("comments").insert({
      post_id: id,
      user_id: session.user.id,
      content,
    });

    if (error) {
      errorEl.textContent = "등록에 실패했습니다: " + error.message;
      errorEl.style.display = "block";
      return;
    }

    contentEl.value = "";
    await loadComments();
  });
}

(async () => {
  await initNav();
  await loadPost();
  await loadComments();
  await initCommentForm();
})();
</script>
</body>
</html>
