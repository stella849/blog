<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>관리자 — 블로그</title>
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<header class="nav-bar">
  <div class="container">
    <a href="index.html" class="brand">BuilderLog</a>
    <nav class="nav-links">
      <a href="index.html">홈</a>
      <a href="mypage.html">마이페이지</a>
      <button id="logout-btn" class="btn-utility">로그아웃</button>
    </nav>
  </div>
</header>

<main class="container mt-lg" style="max-width: 800px;">
  <h1>관리자</h1>

  <section class="mt-lg">
    <h2>게시글 관리</h2>
    <div id="admin-posts" class="stack" style="margin-top: var(--space-md);"><p class="muted">불러오는 중...</p></div>
  </section>

  <section class="mt-lg">
    <h2>카테고리 관리</h2>
    <form id="category-form" class="row" style="margin-top: var(--space-md); flex-wrap: wrap;">
      <input type="text" id="new-category-name" placeholder="새 카테고리 이름" required style="flex: 1; min-width: 160px;" />
      <label class="row" style="gap: var(--space-xxs); align-items:center;">
        <input type="checkbox" id="new-category-private" /> 비공개(본인만 열람)
      </label>
      <button type="submit" class="btn btn-secondary">추가</button>
    </form>
    <div id="admin-categories" class="stack" style="margin-top: var(--space-md);"><p class="muted">불러오는 중...</p></div>
  </section>

  <section class="mt-lg">
    <h2>회원 관리</h2>
    <div id="admin-members" class="stack" style="margin-top: var(--space-md);"><p class="muted">불러오는 중...</p></div>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/nav.js"></script>
<script src="js/util.js"></script>
<script>
let session;

async function loadPosts() {
  const el = document.getElementById("admin-posts");
  const { data: posts, error } = await supabaseClient
    .from("posts")
    .select("id, title, created_at, view_count, profiles(nickname), categories(name)")
    .order("created_at", { ascending: false })
    .order("id", { ascending: false });

  if (error) {
    el.innerHTML = `<p class="form-error">불러오지 못했습니다: ${escapeHtml(error.message)}</p>`;
    return;
  }

  if (!posts || posts.length === 0) {
    el.innerHTML = `<p class="muted">작성된 글이 없습니다.</p>`;
    return;
  }

  el.innerHTML = "";
  posts.forEach((post) => {
    const row = document.createElement("div");
    row.className = "card row-between";
    row.innerHTML = `
      <div>
        <a href="post-detail.html?id=${post.id}"><strong>${escapeHtml(post.title)}</strong></a>
        <div class="meta muted">${escapeHtml(post.profiles?.nickname ?? "알 수 없음")} · ${post.categories?.name ? escapeHtml(post.categories.name) + " · " : ""}${new Date(post.created_at).toLocaleDateString("ko-KR")} · 조회 ${post.view_count}</div>
      </div>
      <div class="row">
        <a href="post-edit.html?id=${post.id}" class="btn-utility">수정</a>
        <button class="btn-utility delete-post-btn" data-id="${post.id}">삭제</button>
      </div>
    `;
    el.appendChild(row);
  });

  el.querySelectorAll(".delete-post-btn").forEach((btn) => {
    btn.addEventListener("click", async () => {
      if (!confirm("이 글을 삭제하시겠습니까?")) return;
      const { error: deleteError } = await supabaseClient.from("posts").delete().eq("id", btn.dataset.id);
      if (deleteError) {
        alert("삭제에 실패했습니다: " + deleteError.message);
        return;
      }
      loadPosts();
    });
  });
}

async function loadCategories() {
  const el = document.getElementById("admin-categories");
  const { data: categories, error } = await supabaseClient
    .from("categories")
    .select("id, name, is_private")
    .order("name");

  if (error) {
    el.innerHTML = `<p class="form-error">불러오지 못했습니다: ${escapeHtml(error.message)}</p>`;
    return;
  }

  el.innerHTML = "";
  (categories || []).forEach((c) => {
    const row = document.createElement("div");
    row.className = "card row-between";
    row.innerHTML = `
      <div>
        <strong>${escapeHtml(c.name)}</strong>
        <span class="muted" style="font-size: var(--text-caption-size);">${c.is_private ? " · 비공개" : " · 공개"}</span>
      </div>
      <div class="row">
        <button class="btn-utility toggle-private-btn" data-id="${c.id}" data-private="${c.is_private}">${c.is_private ? "공개로 전환" : "비공개로 전환"}</button>
        <button class="btn-utility delete-category-btn" data-id="${c.id}">삭제</button>
      </div>
    `;
    el.appendChild(row);
  });

  el.querySelectorAll(".toggle-private-btn").forEach((btn) => {
    btn.addEventListener("click", async () => {
      const isPrivate = btn.dataset.private === "true";
      const { error: updateError } = await supabaseClient
        .from("categories")
        .update({ is_private: !isPrivate })
        .eq("id", btn.dataset.id);
      if (updateError) {
        alert("변경에 실패했습니다: " + updateError.message);
        return;
      }
      loadCategories();
    });
  });

  el.querySelectorAll(".delete-category-btn").forEach((btn) => {
    btn.addEventListener("click", async () => {
      if (!confirm("이 카테고리를 삭제하시겠습니까? 해당 카테고리의 글은 미분류로 남습니다.")) return;
      const { error: deleteError } = await supabaseClient.from("categories").delete().eq("id", btn.dataset.id);
      if (deleteError) {
        alert("삭제에 실패했습니다: " + deleteError.message);
        return;
      }
      loadCategories();
    });
  });
}

document.getElementById("category-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const name = document.getElementById("new-category-name").value.trim();
  const isPrivate = document.getElementById("new-category-private").checked;
  if (!name) return;

  const { error } = await supabaseClient.from("categories").insert({ name, is_private: isPrivate });
  if (error) {
    alert("추가에 실패했습니다: " + error.message);
    return;
  }
  document.getElementById("new-category-name").value = "";
  document.getElementById("new-category-private").checked = false;
  loadCategories();
});

async function loadMembers() {
  const el = document.getElementById("admin-members");
  const { data: members, error } = await supabaseClient
    .from("profiles")
    .select("id, nickname, role, created_at")
    .order("created_at");

  if (error) {
    el.innerHTML = `<p class="form-error">불러오지 못했습니다: ${escapeHtml(error.message)}</p>`;
    return;
  }

  el.innerHTML = "";
  (members || []).forEach((m) => {
    const row = document.createElement("div");
    row.className = "card row-between";
    const isSelf = m.id === session.user.id;
    row.innerHTML = `
      <div>
        <strong>${escapeHtml(m.nickname)}</strong>
        <span class="badge-pill${m.role === "ADMIN" ? " active" : ""}" style="margin-left: var(--space-xs);">${escapeHtml(m.role)}</span>
        <div class="meta muted">가입일 ${new Date(m.created_at).toLocaleDateString("ko-KR")}</div>
      </div>
      <button class="btn-utility toggle-role-btn" data-id="${m.id}" data-role="${m.role}" ${isSelf ? 'disabled title="본인 권한은 변경할 수 없습니다"' : ""}>${m.role === "ADMIN" ? "관리자 해제" : "관리자로 지정"}</button>
    `;
    el.appendChild(row);
  });

  el.querySelectorAll(".toggle-role-btn").forEach((btn) => {
    btn.addEventListener("click", async () => {
      const nextRole = btn.dataset.role === "ADMIN" ? "USER" : "ADMIN";
      if (!confirm(`이 회원을 ${nextRole === "ADMIN" ? "관리자로 지정" : "관리자에서 해제"}하시겠습니까?`)) return;
      const { error: updateError } = await supabaseClient
        .from("profiles")
        .update({ role: nextRole })
        .eq("id", btn.dataset.id);
      if (updateError) {
        alert("변경에 실패했습니다: " + updateError.message);
        return;
      }
      loadMembers();
    });
  });
}

(async () => {
  session = await requireAuth();
  if (!session) return;

  const admin = await isAdmin(session);
  if (!admin) {
    alert("관리자만 접근할 수 있는 페이지입니다.");
    window.location.href = "index.html";
    return;
  }

  await initNav();
  await loadPosts();
  await loadCategories();
  await loadMembers();
})();
</script>
</body>
</html>
