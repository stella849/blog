<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>글 수정 — 블로그</title>
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<header class="nav-bar">
  <div class="container">
    <a href="index.html" class="brand">My Blog</a>
    <nav class="nav-links">
      <a href="index.html">홈</a>
      <a href="mypage.html">마이페이지</a>
      <a href="admin.html" class="admin-only" style="display:none">관리자</a>
      <button id="logout-btn" class="btn-utility">로그아웃</button>
    </nav>
  </div>
</header>

<main class="container mt-lg" style="max-width: 640px;">
  <h1>글 수정</h1>
  <form id="post-form" class="card stack">
    <div class="form-group">
      <label for="published-at">작성일</label>
      <input type="date" id="published-at" required />
    </div>
    <div class="form-group">
      <label for="title">제목</label>
      <input type="text" id="title" required maxlength="200" />
    </div>
    <div class="form-group">
      <label for="category">카테고리</label>
      <select id="category">
        <option value="">미분류</option>
      </select>
      <input type="text" id="new-category" placeholder="목록에 없으면 새 카테고리 이름을 입력하세요" style="margin-top: var(--space-xs);" />
    </div>
    <div class="form-group">
      <label for="media">이미지 또는 첨부파일 (교체 시에만 선택)</label>
      <input type="file" id="media" />
      <div id="current-media" class="muted" style="font-size: var(--text-caption-size); margin-top: var(--space-xxs);"></div>
    </div>
    <div class="form-group">
      <label for="content">본문</label>
      <textarea id="content" required></textarea>
    </div>
    <div class="form-group">
      <label for="tags">태그 (쉼표로 구분)</label>
      <input type="text" id="tags" placeholder="자바, 스프링" />
    </div>
    <div id="error" class="form-error" style="display:none;"></div>
    <button type="submit" class="btn btn-primary">수정 완료</button>
  </form>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/nav.js"></script>
<script>
const id = new URLSearchParams(window.location.search).get("id");
let session;
let currentThumbnail = null;
let currentAttachmentUrl = null;
let currentAttachmentName = null;

async function loadCategories(selectedId) {
  const { data } = await supabaseClient.from("categories").select("id, name").order("name");
  const select = document.getElementById("category");
  (data || []).forEach((c) => {
    const opt = document.createElement("option");
    opt.value = c.id;
    opt.textContent = c.name;
    if (String(c.id) === String(selectedId)) opt.selected = true;
    select.appendChild(opt);
  });
}

async function loadPost() {
  const { data: post, error } = await supabaseClient
    .from("posts")
    .select("id, title, content, thumbnail_image, attachment_url, attachment_name, category_id, user_id, created_at")
    .eq("id", id)
    .single();

  if (error || !post) {
    document.getElementById("error").textContent = "게시글을 찾을 수 없습니다.";
    document.getElementById("error").style.display = "block";
    return;
  }

  if (post.user_id !== session.user.id && !(await isAdmin(session))) {
    alert("본인 글만 수정할 수 있습니다.");
    window.location.href = `post-detail.html?id=${id}`;
    return;
  }

  document.getElementById("title").value = post.title;
  document.getElementById("content").value = post.content;
  document.getElementById("published-at").value = new Date(post.created_at).toISOString().slice(0, 10);
  currentThumbnail = post.thumbnail_image;
  currentAttachmentUrl = post.attachment_url;
  currentAttachmentName = post.attachment_name;
  const mediaLabel = document.getElementById("current-media");
  if (currentAttachmentName) {
    mediaLabel.textContent = `현재 첨부파일: ${currentAttachmentName}`;
  } else if (currentThumbnail) {
    mediaLabel.textContent = `현재 이미지가 등록되어 있습니다.`;
  }
  await loadCategories(post.category_id);

  const { data: tagRows } = await supabaseClient.from("post_tags").select("tags(name)").eq("post_id", id);
  document.getElementById("tags").value = (tagRows || []).map((t) => t.tags?.name).filter(Boolean).join(", ");
}

// 미디어 파일 하나를 업로드하고, 이미지면 썸네일 자리에 / 그 외엔 첨부파일 자리에 담아 반환
async function uploadMedia(file, userId) {
  const path = `${userId}/${Date.now()}-${file.name}`;
  const { error } = await supabaseClient.storage.from("post-images").upload(path, file);
  if (error) throw error;
  const { data } = supabaseClient.storage.from("post-images").getPublicUrl(path);

  if (file.type.startsWith("image/")) {
    return { thumbnailUrl: data.publicUrl, attachmentUrl: null, attachmentName: null };
  }
  return { thumbnailUrl: null, attachmentUrl: data.publicUrl, attachmentName: file.name };
}

async function resolveCategoryId(name) {
  const { data: existing } = await supabaseClient.from("categories").select("id").eq("name", name).maybeSingle();
  if (existing) return existing.id;
  const { data: created, error } = await supabaseClient.from("categories").insert({ name }).select("id").single();
  if (error) throw error;
  return created.id;
}

async function resolveTagIds(tagNames) {
  const ids = [];
  for (const name of tagNames) {
    const { data: existing } = await supabaseClient.from("tags").select("id").eq("name", name).maybeSingle();
    if (existing) {
      ids.push(existing.id);
    } else {
      const { data: created, error } = await supabaseClient.from("tags").insert({ name }).select("id").single();
      if (error) throw error;
      ids.push(created.id);
    }
  }
  return ids;
}

document.getElementById("post-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const errorEl = document.getElementById("error");
  errorEl.style.display = "none";

  const title = document.getElementById("title").value.trim();
  const content = document.getElementById("content").value.trim();
  const newCategoryName = document.getElementById("new-category").value.trim();
  let categoryId = document.getElementById("category").value || null;
  const tagNames = document
    .getElementById("tags")
    .value.split(",")
    .map((t) => t.trim())
    .filter(Boolean);
  const mediaFile = document.getElementById("media").files[0];
  const publishedAt = document.getElementById("published-at").value;

  try {
    if (newCategoryName) categoryId = await resolveCategoryId(newCategoryName);

    let thumbnailUrl = currentThumbnail;
    let attachmentUrl = currentAttachmentUrl;
    let attachmentName = currentAttachmentName;
    if (mediaFile) {
      const media = await uploadMedia(mediaFile, session.user.id);
      thumbnailUrl = media.thumbnailUrl;
      attachmentUrl = media.attachmentUrl;
      attachmentName = media.attachmentName;
    }

    const { error: updateError } = await supabaseClient
      .from("posts")
      .update({
        title,
        content,
        category_id: categoryId,
        thumbnail_image: thumbnailUrl,
        attachment_url: attachmentUrl,
        attachment_name: attachmentName,
        created_at: publishedAt,
      })
      .eq("id", id);

    if (updateError) throw updateError;

    // 태그는 기존 연결을 지우고 새로 연결 (단순한 방식)
    await supabaseClient.from("post_tags").delete().eq("post_id", id);
    if (tagNames.length) {
      const tagIds = await resolveTagIds(tagNames);
      await supabaseClient.from("post_tags").insert(tagIds.map((tagId) => ({ post_id: id, tag_id: tagId })));
    }

    window.location.href = `post-detail.html?id=${id}`;
  } catch (err) {
    errorEl.textContent = "수정에 실패했습니다: " + err.message;
    errorEl.style.display = "block";
  }
});

(async () => {
  session = await requireAuth();
  if (!session) return;
  await initNav();
  await loadPost();
})();
</script>
</body>
</html>
